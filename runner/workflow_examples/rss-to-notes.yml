# RSS to Notes
#
# Periodically fetches an RSS feed and creates a workspace note for each
# item that doesn't have one yet. Demonstrates: scheduled triggers + calling
# the CollabReef API to create notes.
#
# Setup
#   1. Go to "User Settings > API Keys" and create an API key.
#   2. Go to the workspace's "Workflows" settings page and add:
#        secrets: CB_API_KEY        = the API key from step 1
#        vars:    RSS_FEED_URL      = the RSS/Atom feed URL to subscribe to
#                 CB_API_BASE_URL   = an address the runner container can
#                                     reach, e.g. http://collabreef-api:8080
#                 (optional) CB_PARENT_NOTE_ID = the note to nest new notes
#                        under
#   3. The user the API key belongs to must be a member of this workspace.
#
# Note: workflow YAML is visible to all workspace members, so never hardcode
# the API key or other secrets in the run block - always inject them via
# secrets.
name: RSS to Notes
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      feed_url:
        description: "Override the feed URL to fetch (leave empty to use vars.RSS_FEED_URL)"
        default: ""
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch feed and create notes for new items
        run: |
          cat <<'EOF' > sync.js
          const API_BASE = process.env.CB_API_BASE_URL;
          const API_KEY = process.env.CB_API_KEY;
          const WORKSPACE_ID = process.env.CB_WORKSPACE_ID;
          const PARENT_ID = process.env.CB_PARENT_NOTE_ID || "";
          const FEED_URL = process.env.INPUT_FEED_URL || process.env.RSS_FEED_URL;
          const MAX_ITEMS = 10;

          if (!API_BASE || !API_KEY || !FEED_URL) {
            throw new Error("missing CB_API_BASE_URL / CB_API_KEY / RSS_FEED_URL");
          }

          function api(path, opts = {}) {
            return fetch(`${API_BASE}${path}`, {
              ...opts,
              headers: {
                Authorization: `Bearer ${API_KEY}`,
                "Content-Type": "application/json",
                ...(opts.headers || {}),
              },
            });
          }

          function decodeEntities(s) {
            return s
              .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1")
              .replace(/&lt;/g, "<")
              .replace(/&gt;/g, ">")
              .replace(/&amp;/g, "&")
              .replace(/&quot;/g, '"')
              .replace(/&#39;/g, "'")
              .trim();
          }

          function tag(block, name) {
            const m = block.match(new RegExp(`<${name}[^>]*>([\\s\\S]*?)</${name}>`, "i"));
            return m ? decodeEntities(m[1]) : "";
          }

          // Naive RSS 2.0 <item> parser - good enough for most feeds, not a
          // full XML parser. Atom <entry> feeds are not handled here.
          function parseItems(xml) {
            const items = [...xml.matchAll(/<item[\s\S]*?<\/item>/gi)].map((m) => m[0]);
            return items.slice(0, MAX_ITEMS).map((block) => ({
              title: tag(block, "title") || "(untitled)",
              link: tag(block, "link") || tag(block, "guid"),
              pubDate: tag(block, "pubDate"),
              description: tag(block, "description"),
            }));
          }

          async function alreadyExists(link) {
            if (!link) return false;
            const res = await api(
              `/api/v1/workspaces/${WORKSPACE_ID}/notes?pageSize=1&query=${encodeURIComponent(link)}`
            );
            if (!res.ok) throw new Error(`search notes failed: ${res.status} ${await res.text()}`);
            const notes = await res.json();
            return notes.length > 0;
          }

          async function createNote(item) {
            const content = [
              `**Source:** ${item.link}`,
              "",
              item.description,
              "",
              item.pubDate ? `---\n_Published ${item.pubDate}_` : "",
            ].join("\n");

            const res = await api(`/api/v1/workspaces/${WORKSPACE_ID}/notes`, {
              method: "POST",
              headers: { "X-Content-Format": "markdown" },
              body: JSON.stringify({
                visibility: "workspace",
                title: item.title,
                content,
                parent_id: PARENT_ID,
              }),
            });
            if (!res.ok) throw new Error(`create note failed: ${res.status} ${await res.text()}`);
          }

          (async () => {
            const feedRes = await fetch(FEED_URL);
            if (!feedRes.ok) throw new Error(`fetch feed failed: ${feedRes.status}`);
            const items = parseItems(await feedRes.text());

            let created = 0;
            let skipped = 0;
            for (const item of items) {
              if (await alreadyExists(item.link)) {
                skipped++;
                continue;
              }
              await createNote(item);
              created++;
            }
            console.log(`done: ${created} new note(s), ${skipped} already existed`);
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          EOF
          node sync.js
        env:
          RSS_FEED_URL: ${{ vars.RSS_FEED_URL }}
          INPUT_FEED_URL: ${{ github.event.inputs.feed_url }}
          CB_API_KEY: ${{ secrets.CB_API_KEY }}
          CB_API_BASE_URL: ${{ vars.CB_API_BASE_URL }}
          CB_PARENT_NOTE_ID: ${{ vars.CB_PARENT_NOTE_ID }}
