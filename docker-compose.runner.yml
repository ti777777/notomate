# Optional workflow runner, split out of docker-compose.yml so it can be
# added independently. Run alongside the core stack with:
#   docker compose -f docker-compose.yml -f docker-compose.runner.yml up -d
services:
  collabreef-runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    image: collabreef/collabreef-runner:local
    container_name: collabreef-runner
    environment:
      - CB_INSTANCE_ADDR=collabreef-api:50051
      # Must match RUNNER_REGISTRATION_TOKEN on collabreef-api (or omit both
      # and register with the token from GET /api/v1/admin/runners/registration-token).
      - CB_RUNNER_REGISTRATION_TOKEN=${RUNNER_REGISTRATION_TOKEN}
      - CB_RUNNER_NAME=default-runner
      - CB_RUNNER_LABELS=ubuntu-latest:docker://node:20-bullseye
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bin/runner-data:/data
    depends_on:
      - collabreef-api
    restart: unless-stopped
