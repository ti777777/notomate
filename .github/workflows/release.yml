name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  REGISTRY: docker.io
  IMAGE_API: ${{ secrets.DOCKERHUB_USERNAME }}/notomate-api
  IMAGE_COLLAB: ${{ secrets.DOCKERHUB_USERNAME }}/notomate-collab
  IMAGE_NGINX: ${{ secrets.DOCKERHUB_USERNAME }}/notomate-nginx
  IMAGE_RUNNER: ${{ secrets.DOCKERHUB_USERNAME }}/notomate-runner

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Remove 'v' prefix for Docker tag
          VERSION_TAG="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Version Tag: $VERSION_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION_TAG }}
            type=raw,value=latest

      - name: Extract metadata (collab)
        id: meta-collab
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_COLLAB }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION_TAG }}
            type=raw,value=latest

      - name: Extract metadata (nginx)
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NGINX }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION_TAG }}
            type=raw,value=latest

      - name: Extract metadata (runner)
        id: meta-runner
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_RUNNER }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION_TAG }}
            type=raw,value=latest

      - name: Build and push api image (api-runtime)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: api-runtime
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push collab image (collab-runtime)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: collab-runtime
          push: true
          tags: ${{ steps.meta-collab.outputs.tags }}
          labels: ${{ steps.meta-collab.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push nginx image (nginx-runtime)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: nginx-runtime
          push: true
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push runner image
        uses: docker/build-push-action@v5
        with:
          context: ./runner
          file: ./runner/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: ${{ steps.meta-runner.outputs.tags }}
          labels: ${{ steps.meta-runner.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "## Release ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "**API:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_API }}:${{ steps.version.outputs.VERSION_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_API }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Collab:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_COLLAB }}:${{ steps.version.outputs.VERSION_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_COLLAB }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Nginx (static frontend):**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_NGINX }}:${{ steps.version.outputs.VERSION_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_NGINX }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Runner (workflow runner):**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_RUNNER }}:${{ steps.version.outputs.VERSION_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_RUNNER }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download" >> $GITHUB_STEP_SUMMARY
          echo "- [Release Page](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.VERSION }})" >> $GITHUB_STEP_SUMMARY
