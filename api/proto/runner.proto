syntax = "proto3";

package runner;

// RunnerService is the act_runner-style protocol between the CollabReef API
// and workflow runners. Like collab.proto this file is documentation only:
// the implementation uses JSON encoding over gRPC transport (the Go server
// registers a JSON codec under the "proto" name), so no protoc generation is
// required and the runner client must use the same JSON codec.
//
// Auth: Register validates the instance registration token carried in the
// request. All other methods require the runner session token via metadata
// "authorization: Bearer cbr_<hex>".

service RunnerService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // FetchTask long-polls up to 30s for a queued job matching the runner's labels.
  rpc FetchTask(FetchTaskRequest) returns (FetchTaskResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc UpdateLog(UpdateLogRequest) returns (UpdateLogResponse);
}

message RegisterRequest  { string registration_token = 1; string name = 2; string version = 3; repeated string labels = 4; }
message RegisterResponse { string runner_id = 1; string session_token = 2; }

message TaskPayload {
  string job_id = 1; string run_id = 2; int32 run_number = 3; string workspace_id = 4;
  string workflow_name = 5; string job_name = 6; string workflow_yaml = 7;
  string event_name = 8; string event_payload_json = 9;
  // Workspace-scoped vars/secrets, exposed to the job as vars.*/secrets.*.
  // Secrets are decrypted server-side just before being sent here.
  map<string, string> vars = 10; map<string, string> secrets = 11;
}

message FetchTaskRequest  {}
message FetchTaskResponse { bool found = 1; TaskPayload job = 2; }

message UpdateTaskRequest  { string job_id = 1; string status = 2; string message = 3; }
message UpdateTaskResponse { bool cancelled = 1; }

message UpdateLogRequest  { string job_id = 1; int32 start_line = 2; repeated string lines = 3; }
message UpdateLogResponse { int32 ack_line = 1; bool cancelled = 2; }
