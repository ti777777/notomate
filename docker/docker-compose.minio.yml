services:
  minio:
    image: minio/minio:latest
    container_name: notomate-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: notomate-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/notomate --ignore-existing;
      mc anonymous set download myminio/notomate;
      exit 0;
      "

  notomate-nginx:
    build:
      context: ..
      dockerfile: Dockerfile
      target: nginx-runtime
    image: notomate/notomate-nginx:local
    container_name: notomate-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - notomate-api
      - notomate-collab

  notomate-collab:
    build:
      context: ..
      dockerfile: Dockerfile
      target: collab-runtime
    image: notomate/notomate-collab:local
    container_name: notomate-collab
    restart: unless-stopped
    volumes:
      - ../bin:/usr/local/app/bin
    environment:
      PORT: 3000
      DB_DRIVER: sqlite3
      DB_DSN: /usr/local/app/bin/notomate.db
      APP_SECRET: ${APP_SECRET}
    depends_on:
      minio:
        condition: service_healthy

  notomate-api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api-runtime
    image: notomate/notomate-api:local
    container_name: notomate-api
    restart: unless-stopped
    volumes:
      - ../bin:/usr/local/app/bin
    environment:
      STORAGE_TYPE: s3
      STORAGE_S3_ENDPOINT: minio:9000
      STORAGE_S3_ACCESS_KEY: minioadmin
      STORAGE_S3_SECRET_KEY: minioadmin
      STORAGE_S3_BUCKET: notomate
      STORAGE_S3_USE_SSL: "false"
      PORT: 8080
      APP_DISABLE_SIGNUP: ${APP_DISABLE_SIGNUP}
      APP_SECRET: ${APP_SECRET}
    depends_on:
      minio:
        condition: service_healthy
      notomate-collab:
        condition: service_started

volumes:
  minio_data:
    driver: local
