services:
  collabreef-nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-runtime
    image: collabreef/collabreef-nginx:local
    container_name: collabreef-nginx
    ports:
      - "8080:80"
    depends_on:
      - collabreef-api
      - collabreef-collab
    restart: unless-stopped

  collabreef-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
    image: collabreef/collabreef:local
    container_name: collabreef-api
    command: ["./api"]
    volumes:
      - "./bin:/usr/local/app/bin"
    environment:
      - PORT=8080
      - DB_DRIVER=sqlite3
      - DB_DSN=/usr/local/app/bin/collabreef.db
      - APP_DISABLE_SIGNUP=${APP_DISABLE_SIGNUP}
      - APP_SECRET=${APP_SECRET}
    ports:
      # gRPC port for the runner (docker-compose.runner.yml), which lives in
      # a separate compose project and can't reach collabreef-api by service
      # name. Bound to localhost only: the runner protocol has token auth
      # but no TLS.
      - "127.0.0.1:50051:50051"
    restart: unless-stopped

  collabreef-collab:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
    image: collabreef/collabreef:local
    container_name: collabreef-collab
    command: ["node", "collab/src/index.js"]
    environment:
      - PORT=3000
      - APP_SECRET=${APP_SECRET}
      - GRPC_ADDR=collabreef-api:50051
    depends_on:
      - collabreef-api
    restart: unless-stopped
